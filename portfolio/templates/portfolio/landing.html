{% extends "portfolio/base.html" %}

{% block content %}
<style>
    .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 80px 20px;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
        border-radius: 16px;
        margin-bottom: 20px;
    }

    .hero-badge {
        background: rgba(37, 99, 235, 0.2);
        border: 1px solid rgba(37, 99, 235, 0.4);
        color: #93c5fd;
        padding: 6px 16px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 24px;
    }

    .hero h2 {
        font-size: clamp(36px, 6vw, 72px);
        font-weight: 700;
        color: white;
        margin-bottom: 16px;
    }

    .hero p {
        font-size: 18px;
        color: #94a3b8;
        max-width: 500px;
        margin-bottom: 40px;
    }

    .hero-nav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .hero-nav a {
        color: #cbd5e1;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 10px 20px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.05);
        transition: all 0.2s ease;
    }

    .hero-nav a:hover {
        background: rgba(37, 99, 235, 0.3);
        color: white;
    }

    .hero-nav a.primary {
        background: #2563eb;
        border-color: #2563eb;
        color: white;
    }
</style>

<div class="hero">
    <div class="hero-badge">Engenharia Informática — Universidade Lusófona</div>
    <h2>Guilherme Carvalho</h2>
    <p>Estudante de Engenharia Informática.</p>
    <div class="hero-nav">
        <a href="{% url 'licenciatura' %}" class="primary">Ver Portfolio</a>
        <a href="{% url 'projetos' %}">Projetos</a>
        <a href="{% url 'tecnologias' %}">Tecnologias</a>
        <a href="{% url 'artigos' %}">Artigos</a>
        <a href="{% url 'sobre' %}">Sobre</a>
    </div>
</div>
{% endblock %}
