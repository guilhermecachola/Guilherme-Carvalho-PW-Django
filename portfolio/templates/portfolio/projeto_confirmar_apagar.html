{% extends "portfolio/base.html" %}

{% block content %}
<h2>Apagar Projeto</h2>
<p>Tens a certeza que queres apagar o projeto <strong>{{ projeto.titulo }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sim, apagar</button>
</form>
<a href="{% url 'projetos' %}">Cancelar</a>
{% endblock %}
