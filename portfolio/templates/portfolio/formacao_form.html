{% extends "portfolio/base.html" %}

{% block content %}
<h2>{% if formacao %}Editar{% else %}Criar{% endif %} Formação</h2>

<form method="post">
    {% csrf_token %}
    <p><label>Título:<br><input type="text" name="titulo" value="{{ formacao.titulo }}" required></label></p>
    <p><label>Instituição:<br><input type="text" name="instituicao" value="{{ formacao.instituicao }}"></label></p>
    <p><label>Data início:<br><input type="date" name="data_inicio" value="{{ formacao.data_inicio }}"></label></p>
    <p><label>Data fim:<br><input type="date" name="data_fim" value="{{ formacao.data_fim }}"></label></p>
    <p><label>URL Certificado:<br><input type="url" name="certificado_url" value="{{ formacao.certificado_url }}"></label></p>
    <p><label>Descrição:<br><textarea name="descricao">{{ formacao.descricao }}</textarea></label></p>
    <p><button type="submit">Guardar</button></p>
</form>
<a href="{% url 'formacoes' %}">Cancelar</a>
{% endblock %}
